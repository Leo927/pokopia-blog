baseURL = "https://pokopia.github.io/"  # Change to your GitHub Pages URL
title = "Pokopia"
theme = "ananke"

defaultContentLanguage = "en"
defaultContentLanguageInSubdir = true

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

# Pagefind output
[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  env = "production"
  description = "Pokopia Strategy Blog — Competitive insights and team building guides"
  author = "Pokopia"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  disableSpecial404 = true
  disableHLJS = true

  [params.homeInfoParams]
    Title = "Pokopia"
    Content = "Strategy guides, team building, and competitive analysis"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/pokopia"

[languages]
  [languages.en]
    contentDir = "content/en"
    languageName = "English"
    languageCode = "en"
    weight = 1
    title = "Pokopia"
    [languages.en.params]
      description = "Strategy guides, team building, and competitive analysis"
      [languages.en.params.homeInfoParams]
        Title = "Pokopia"
        Content = "Strategy guides, team building, and competitive analysis"

  [languages.zh]
    contentDir = "content/zh"
    languageName = "中文"
    languageCode = "zh"
    weight = 2
    title = "Pokopia"
    [languages.zh.params]
      description = "策略攻略、队伍构建与对战分析"
      [languages.zh.params.homeInfoParams]
        Title = "Pokopia"
        Content = "策略攻略、队伍构建与对战分析"

[languages.en.menu]
  [[languages.en.menu.main]]
    name = "Strategies"
    url = "/en/strategies/"
    weight = 10
  [[languages.en.menu.main]]
    name = "Search"
    url = "/en/search/"
    weight = 20
  [[languages.en.menu.main]]
    name = "Tags"
    url = "/en/tags/"
    weight = 30

[languages.zh.menu]
  [[languages.zh.menu.main]]
    name = "策略"
    url = "/zh/strategies/"
    weight = 10
  [[languages.zh.menu.main]]
    name = "搜索"
    url = "/zh/search/"
    weight = 20
  [[languages.zh.menu.main]]
    name = "标签"
    url = "/zh/tags/"
    weight = 30

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true

[taxonomies]
  tag = "tags"
  category = "categories"
