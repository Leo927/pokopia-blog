<!-- Language Switcher -->
{{ if .IsTranslated }}
<style>
  .lang-switch {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 100;
    display: flex;
    gap: 8px;
  }
  .lang-switch a {
    background: var(--theme);
    color: var(--primary);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 6px;
    text-decoration: none;
    font-size: 14px;
    transition: all 0.2s;
  }
  .lang-switch a:hover {
    background: var(--primary);
    color: var(--theme);
  }
</style>
<div class="lang-switch">
  {{ range .Translations }}
    <a href="{{ .Permalink }}">{{ .Language.LanguageName }}</a>
  {{ end }}
</div>
{{ end }}
